<!DOCTYPE html>
<!-- Version: v0.1.36 -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>VIEWSTER Mobile Demo v5.7</title>
  <style>
    :root{
      --bg:#f4f5f7;
      --card:#ffffff;
      --text:#111827;
      --sub:#6b7280;
      --line:#e5e7eb;
      --primary:#2563eb;
      --accent:#ff575d;
      --green:#16a34a;
      --pill:#eff2f6;
      --shadow:0 8px 24px rgba(15,23,42,.06);
      --header-h:56px;
      --safe-top: env(safe-area-inset-top, 0px);
      --sheet-top:0px;
      --scroll-top:0px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{margin:0;padding:0;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;color:var(--text);}
    body{min-height:100vh;overflow-x:hidden;overflow-y:auto;}
    button,input{font:inherit;}
    img{display:block;max-width:100%;}
    .hidden{display:none !important;}

    .app{
      width:100%;
      max-width:430px;
      min-height:100vh;
      height:auto;
      margin:0 auto;
      background:var(--bg);
      position:relative;
      overflow-x:hidden;
      overflow-y:visible;
      box-shadow:none;
    }

    .screen{
      position:absolute; inset:0;
      display:none;
      background:var(--bg);
    }
    .screen.active{display:flex; flex-direction:column;}

    .header{
      height:calc(var(--header-h) + var(--safe-top));
      background:#fff;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:var(--safe-top) 12px 0;
      flex-shrink:0;
      z-index:30;
      gap:8px;
    }
    .header-left,.header-right{display:flex;align-items:center;gap:10px;min-width:0;}
    .icon-btn{
      width:32px;height:32px;border:none;background:#fff;border-radius:10px;
      display:grid;place-items:center;cursor:pointer;flex-shrink:0;
    }
    .icon-btn svg{width:20px;height:20px;stroke:#111;}
    .brand{
      display:flex;align-items:center;gap:7px;font-weight:900;font-size:14px;
      min-width:0;white-space:nowrap;
    }
    .brand img{width:24px;height:24px;object-fit:contain;flex-shrink:0;}

    .header-test-tools{
      display:flex;
      align-items:center;
      gap:4px;
      margin-left:auto;
      min-width:0;
      overflow-x:auto;
      -ms-overflow-style:none;
      scrollbar-width:none;
    }
    .header-test-tools::-webkit-scrollbar{display:none;}
    .dev-version-label{
      margin-left:auto;
      font-size:11px;
      font-weight:700;
      color:#9ca3af;
      white-space:nowrap;
      flex-shrink:0;
      align-self:center;
    }

    .tool-btn{
      border:none;
      background:#eef3ff;
      color:#2457d6;
      border-radius:10px;
      padding:5px 7px;
      font-size:11px;
      font-weight:900;
      white-space:nowrap;
      cursor:pointer;
      flex-shrink:0;
      height:28px;
      line-height:1;
    }

    .main-scroll{
      flex:1;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      padding-bottom:18px;
    }

    /* HOME */
    .tabs-wrap{
      background:#fff;
      border-bottom:1px solid var(--line);
      padding:10px 12px 12px;
    }
    .tabs{
      display:flex;
      gap:8px;
      overflow:auto;
    }
    .tabs::-webkit-scrollbar{display:none;}
    .tab{
      border:none;
      background:#f0f2f5;
      color:#111;
      padding:9px 13px;
      border-radius:11px;
      white-space:nowrap;
      font-weight:800;
      cursor:pointer;
      font-size:13px;
    }
    .tab.active{background:#111827;color:#fff;}

    .promo-banner{
      margin:10px 12px 8px;
      background:#ffd6e8;
      border-radius:14px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }
    .promo-banner img{width:100%;height:76px;object-fit:cover;}

    .list{padding:0 12px 10px;}
    .video-card{
      background:#fff;
      border-radius:16px;
      overflow:hidden;
      box-shadow:var(--shadow);
      margin-bottom:14px;
      cursor:pointer;
    }
    .thumb-wrap{
      position:relative;
      aspect-ratio:16/9;
      background:#dcdfe5;
    }
    .thumb-wrap img{width:100%;height:100%;object-fit:cover;}
    .info-dot{
      position:absolute;right:10px;top:10px;width:26px;height:26px;border-radius:50%;
      background:rgba(255,255,255,.93);display:grid;place-items:center;font-weight:900;color:#111;font-size:13px;
    }
    .reward-done{
      position:absolute;right:10px;bottom:10px;background:#1fbf5b;color:#fff;
      border-radius:10px;padding:4px 8px;font-size:11px;font-weight:900;
    }
    .card-body{padding:10px 12px 13px;}
    .title{
      font-size:15px;font-weight:900;line-height:1.34;margin:0 0 7px;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .meta-row{display:flex;align-items:center;gap:7px;color:var(--sub);font-size:12px;}
    .avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#ddd;}

    /* WATCH */
    .watch-root{
      position:relative;
      background:var(--bg);
      overflow:visible;
    }

    .top-fixed{
      position:sticky;
      top:var(--safe-top); left:0; right:0;
      z-index:20;
      background:transparent;
    }

    .player-wrap{background:#000;}
    .player{
      width:100%;
      aspect-ratio:16/9;
      background:#000;
      position:relative;
    }
    .player iframe{
      width:100%;
      height:100%;
      border:none;
      display:block;
      position:relative;
      z-index:2;
    }

    .paid-badge{
      position:absolute;
      left:10px;
      top:10px;
      background:rgba(0,0,0,.75);
      color:#fff;
      border-radius:10px;
      padding:7px 10px;
      font-size:12px;
      font-weight:800;
      display:flex;
      align-items:center;
      gap:6px;
      z-index:2;
      transition:opacity .25s ease, transform .25s ease;
    }
    .paid-badge.hide-after{
      opacity:0;
      transform:translateY(-6px);
      pointer-events:none;
    }

    #watchScreen > .header{
      display:none;
    }

    #watchScreen.active{
      position:relative;
      inset:auto;
      display:block;
      height:auto;
      background:var(--bg);
      overflow:visible;
    }

    #watchScreen.active::after{
      display:none;
    }

    .player-float-controls{
      position:absolute;
      top:10px;
      left:10px;
      right:10px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:8px;
      z-index:50;
      pointer-events:none;
      
    }
/* 기본은 흐리게 */
#watchScreen:not(.mini-mode) .player-float-controls{
  opacity:.32;
  transition:opacity .2s ease;
  top:10px;
  left:12px;
  right:12px;
  z-index:50;
}

/* 활성화되면 선명하게 */
#watchScreen:not(.mini-mode) .player-float-controls.controls-awake{
  opacity:1;
}
    .player-left-controls,
    .player-right-controls{
      display:flex;
      align-items:center;
      gap:6px;
      pointer-events:auto;
      position:relative;
      z-index:51;
    }

    .player-right-controls{
      margin-left:auto;
      max-width:72%;
      overflow:hidden;
    }

    #enterMiniBtn,
    #toggleMiniSizeBtn,
    .player-test-tools,
    .player-test-tools .tool-btn{
      position:relative;
      z-index:51;
      pointer-events:auto;
    }

    .player-fab{
      height:34px;
      min-width:34px;
      padding:0 11px;
      border:none;
      border-radius:999px;
      background:rgba(17,24,39,.78);
      color:#fff;
      font-size:12px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:5px;
      cursor:pointer;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      box-shadow:0 6px 18px rgba(0,0,0,.22);
    }
    .player-fab.icon-only{
      width:34px;
      padding:0;
    }
#enterMiniBtn{
  font-size:22px;
  font-weight:900;
  line-height:1;
  padding-top:1px;
}

    .player-test-tools{
      display:flex;
      gap:6px;
      overflow-x:auto;
      -ms-overflow-style:none;
      scrollbar-width:none;
    }
    .player-test-tools::-webkit-scrollbar{display:none;}
    .player-test-tools .tool-btn{
      height:34px;
      padding:0 10px;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      color:#2457d6;
      font-size:12px;
    }

    .mini-close-btn,
    .mini-restore-hit{
      display:none;
    }

    .mini-ad-wrap{
      display:none;
    }
    .mini-ad-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    #watchScreen.mini-mode{
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      background:transparent;
      pointer-events:none;
      z-index:35;
    }

    #watchScreen.mini-mode .watch-root{
      flex:1;
      min-height:100%;
      background:transparent;
      overflow:visible;
      pointer-events:none;
    }

    #watchScreen.mini-mode .watch-scroll{
      display:none;
    }

    #watchScreen.mini-mode .watch-info-fixed{
      display:none;
    }

    /* PIP 카드: 하나의 묶음처럼 보이게 */
    #watchScreen.mini-mode .top-fixed{
      position:absolute;
      right:12px;
      bottom:74px;
      left:auto;
      top:auto;
      width:170px;
      z-index:60;
      pointer-events:auto;

      display:flex;
      flex-direction:column;
      gap:0;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 16px 40px rgba(2,6,23,.34);
      background:#111827;
    }

    #watchScreen.mini-mode .player-wrap{
      border-radius:0;
      overflow:hidden;
      box-shadow:none;
      background:#000;
    }

    #watchScreen.mini-mode .player{
      aspect-ratio:16/9;
    }

    /* 하단 띠배너 */
    #watchScreen.mini-mode .mini-ad-wrap{
      display:block;
      width:100%;
      height:36px;
      background:#fff;
      overflow:hidden;
      border-top:1px solid rgba(0,0,0,.05);
      pointer-events:auto;
    }

    /* 3단계 크기 */
    #watchScreen.mini-mode.mini-size-1 .top-fixed{
      width:170px;
    }
    #watchScreen.mini-mode.mini-size-1 .mini-ad-wrap{
      height:36px;
    }

    #watchScreen.mini-mode.mini-size-2 .top-fixed{
      width:230px;
    }
    #watchScreen.mini-mode.mini-size-2 .mini-ad-wrap{
      height:40px;
    }

    #watchScreen.mini-mode.mini-size-3 .top-fixed{
      width:calc(100% - 24px);
    }
    #watchScreen.mini-mode.mini-size-3 .mini-ad-wrap{
      height:44px;
    }

    #watchScreen.mini-mode #toggleMiniSizeBtn{
      display:inline-flex !important;
    }

    #watchScreen.mini-mode #enterMiniBtn{
      display:none;
    }

    #watchScreen.mini-mode .paid-badge{
      display:none;
    }

    #watchScreen.mini-mode .player-float-controls{
      top:8px;
      left:8px;
      right:8px;
      z-index:80;
    }

    #watchScreen.mini-mode .player-test-tools{
      display:none;
    }

    #watchScreen.mini-mode .mini-close-btn,
    #watchScreen.mini-mode .mini-restore-hit{
      display:block;
    }

    .mini-close-btn{
      position:absolute;
      top:8px;
      right:8px;
      width:28px;
      height:28px;
      border:none;
      border-radius:999px;
      background:rgba(17,24,39,.82);
      color:#fff;
      font-size:18px;
      line-height:1;
      cursor:pointer;
      z-index:90;
      pointer-events:auto;
      box-shadow:0 6px 18px rgba(0,0,0,.25);
    }

    .mini-restore-hit{
      position:absolute;
      inset:0;
      border:none;
      background:transparent;
      cursor:pointer;
      z-index:70;
    }

    .watch-info-fixed{
      background:#fff;
      border-bottom:1px solid #edf0f4;
      box-shadow:0 4px 18px rgba(15,23,42,.04);
      overflow:hidden;
    }

    .watch-card{
      background:#fff;
      padding:7px 12px 2px;
    }

    .watch-title{
      margin:0 0 3px;
      font-size:15px;
      font-weight:900;
      line-height:1.35;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      cursor:pointer;
    }
    .watch-title.expanded{
      white-space:normal;
      overflow:visible;
      text-overflow:unset;
      display:block;
    }

    .watch-sub{
      font-size:12px;
      color:var(--sub);
      margin-bottom:4px;
    }

    /* 제목/채널 아래만 접히는 영역 */
    .watch-collapse-area{
      overflow:hidden;
      max-height:180px;
      opacity:1;
      transition:max-height .28s ease, opacity .22s ease;
    }
    .watch-collapse-area.collapsed{
      max-height:0;
      opacity:0;
      pointer-events:none;
    }

    .small-actions{
      display:flex;
      gap:6px;
      margin-bottom:4px;
      justify-content:flex-end;
    }
    .small-pill{
      flex:0 0 auto;
      padding:0 12px;
    }

    .small-pill{
      flex:1;
      height:28px;
      border:none;
      border-radius:999px;
      background:var(--pill);
      color:#222;
      font-size:12px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:4px;
      cursor:pointer;
      padding:0 10px;
    }

    .reward-inline{
      position:relative;
      min-height:32px;
      margin-bottom:0;
      border-radius:999px;
    }
    .reward-line-inner{
      display:flex;
      align-items:center;
      gap:8px;
      width:100%;
      min-height:32px;
    }
    .reward-inline .label{
      font-size:13px;
      font-weight:900;
      white-space:nowrap;
      flex-shrink:0;
    }
    .reward-inline .track{
      flex:1;
      height:7px;
      background:#e7eaf0;
      border-radius:999px;
      overflow:hidden;
      min-width:0;
    }
    .reward-inline .fill{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,#3b82f6,#22c55e);
      border-radius:999px;
      transition:width .35s ease;
    }
    .reward-inline .right{
      min-width:52px;
      text-align:right;
      font-size:13px;
      font-weight:800;
      color:#4b5563;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:flex-end;
    }

    .reward-get-wrap{
      display:none;
      width:100%;
    }
    .reward-inline.reward-ready .reward-line-inner{
      display:none;
    }
    .reward-inline.reward-ready .reward-get-wrap{
      display:block;
    }

    .reward-wide-btn{
      width:100%;
      height:38px;
      border:none;
      border-radius:999px;
      background:linear-gradient(180deg,#ff6a70,#ff4e57);
      color:#fff;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(255,87,93,.22);
    }

    .big-banner{
      margin:6px 12px 8px;
      border-radius:14px;
      overflow:hidden;
      background:#111;
      height:62px;
      box-shadow:var(--shadow);
    }
    .big-banner img{width:100%;height:100%;object-fit:cover;}

    .watch-scroll{
      display:block;
      margin-top:0;
      background:var(--bg);
      padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 40px);
    }
    .watch-scroll::after{
      display:none;
    }

    .section-title{
      padding:0 12px 8px;
      font-size:15px;
      font-weight:900;
      color:#111;
      background:#fff;
    }

    .recommend-list{
      padding:0 12px;
      background:#fff;
    }
    .recommend-item{
      display:flex;
      gap:10px;
      padding:12px 0;
      border-bottom:1px solid var(--line);
      cursor:pointer;
    }
    .recommend-item + .recommend-item{margin-top:6px;}
    .recommend-item:last-child{border-bottom:none;margin-bottom:8px;}
    .recommend-thumb{
      width:178px;
      aspect-ratio:16/9;
      border-radius:12px;
      overflow:hidden;
      background:#ddd;
      flex-shrink:0;
      position:relative;
      transition:transform .14s ease, filter .14s ease, box-shadow .14s ease;
    }
    .recommend-item:active .recommend-thumb{
      transform:scale(.985);
      filter:brightness(.94);
      box-shadow:0 4px 10px rgba(15,23,42,.12);
    }
    .recommend-thumb img{width:100%;height:100%;object-fit:cover;}
    .recommend-info{min-width:0;flex:1;}
    .recommend-title{
      font-size:14px;
      font-weight:500;
      line-height:1.35;
      margin:0 0 5px;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
      text-overflow:ellipsis;
      word-break:break-word;
    }
    .recommend-sub{
      font-size:12px;
      color:var(--sub);
      line-height:1.35;
      white-space:normal;
      word-break:break-word;
    }

    /* Overlay / sheets */
    .overlay{
      position:absolute;
      left:0; right:0; bottom:0;
      top:var(--sheet-top);
      background:rgba(0,0,0,.48);
      z-index:40;
      display:none;
    }
    .overlay.show{display:block;}

    .sheet{
      position:absolute;
      left:0; right:0; bottom:0;
      top:var(--sheet-top);
      z-index:50;
      background:#fff;
      border-radius:24px 24px 0 0;
      transform:translateY(100%);
      transition:transform .28s ease;
      display:flex;
      flex-direction:column;
      box-shadow:none;
      overflow:hidden;
    }
    .sheet.show{
      transform:translateY(0);
      box-shadow:0 -12px 40px rgba(2,6,23,.18);
    }

    .sheet-head{
      height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      flex-shrink:0;
      background:#fff;
      border-bottom:1px solid rgba(0,0,0,.04);
    }
    .sheet-head::before{
      content:"";
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      width:44px;height:5px;border-radius:999px;background:#d9dee7;
    }
    .sheet-close{
      position:absolute;
      right:10px;
      top:8px;
      width:32px;height:32px;
      border:none;
      border-radius:10px;
      background:#f3f4f6;
      color:#111;
      font-size:18px;
      cursor:pointer;
      display:grid;
      place-items:center;
    }
    .sheet-body{
      overflow-y:auto;
      padding:0 16px 20px;
    }

    .sheet-title{
      font-size:18px;
      font-weight:900;
      margin:8px 0 14px;
    }

    .wallet-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:14px;
    }
    .wallet-card{
      background:#f5f7fb;
      border-radius:16px;
      padding:16px;
      text-align:center;
    }
    .wallet-card.full{grid-column:1 / -1;}
    .wallet-label{font-size:13px;color:#6b7280;font-weight:700;}
    .wallet-value{font-size:22px;font-weight:900;color:var(--primary);margin-top:8px;}

    .wallet-action-row{
      display:flex;
      gap:10px;
      margin-top:8px;
    }
    .wallet-open-btn{
      flex:1;
      height:42px;
      border:none;
      border-radius:14px;
      background:#111827;
      color:#fff;
      font-weight:900;
      font-size:14px;
      cursor:pointer;
    }
    .wallet-open-btn.gold{
      background:linear-gradient(180deg,#f8d34e,#d9a911);
      color:#2b2100;
    }

    .comment-tab{
      display:flex;
      gap:8px;
      margin-bottom:12px;
    }
    .chip{
      border:none;
      background:#eef2f7;
      color:#111;
      padding:8px 12px;
      border-radius:999px;
      font-weight:800;
    }
    .chip.active{background:#111827;color:#fff;}
    .comment-item{
      display:flex;
      gap:10px;
      padding:14px 0;
      border-bottom:1px solid #edf0f4;
    }
    .comment-avatar{
      width:38px;height:38px;border-radius:50%;background:#ddd;object-fit:cover;flex-shrink:0;
    }
    .comment-name{font-size:13px;font-weight:900;margin-bottom:4px;}
    .comment-text{
      font-size:13px;
      line-height:1.5;
      color:#374151;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .ad-top{
      padding:0 16px 10px;
      font-size:18px;
      font-weight:900;
    }
    .ad-desc{
      padding:0 16px 14px;
      color:#c8d0dd;
      font-size:13px;
      line-height:1.5;
    }
    .ad-frame{
      margin:0 16px;
      border-radius:18px;
      overflow:hidden;

    function extractVideoId(url){
      try{
        const u = new URL(url);
        if(u.hostname.includes("youtu.be")) return u.pathname.replace("/","");
        return u.searchParams.get("v");
      }catch(e){
        return null;
      }
    }

    // Always build a valid privacy-enhanced YouTube embed URL.
    function buildYouTubeEmbedUrl(videoId){
      const id = String(videoId || "").trim();
      if(!id) return "";

      const params = new URLSearchParams({
        autoplay: "1",
        mute: "0",
        playsinline: "1",
        rel: "0"
      });

      return `https://www.youtube-nocookie.com/embed/${encodeURIComponent(id)}?${params.toString()}`;
    }

    function formatTime(totalSeconds){
      const m = Math.floor(totalSeconds / 60);
      const s = totalSeconds % 60;
      return `${m}:${String(s).padStart(2,"0")}`;
    }

    function formatViews(num){
      const n = Number(num || 0);
      if(n >= 100000000) return `조회수 ${(n / 100000000).toFixed(1)}억회`;
      if(n >= 10000) return `조회수 ${Math.floor(n / 10000)}만회`;
      return `조회수 ${n.toLocaleString()}회`;
    }

    function showToast(message){
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function weightedRandom(items){
      const total = items.reduce((sum, item) => sum + item.weight, 0);
      let rnd = Math.random() * total;
      for(const item of items){
        rnd -= item.weight;
        if(rnd <= 0) return item.value;
      }
      return items[items.length - 1].value;
    }

    function escapeHtml(str){
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    }

    async function loadVideosFromYouTube(){
      const ids = VIDEO_URL_POOL.map(extractVideoId).filter(Boolean);
      if(!YT_API_KEY){
        homeList.innerHTML = '<div class="loading">YT_API_KEY를 넣어주세요.</div>';
        recommendList.innerHTML = '<div class="loading">YT_API_KEY를 넣어주세요.</div>';
        return;
      }

      try{
        const chunkSize = 50;
        const results = [];

        for(let i = 0; i < ids.length; i += chunkSize){
          const chunk = ids.slice(i, i + chunkSize);
          const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${chunk.join(",")}&key=${YT_API_KEY}&maxResults=50`;
          const res = await fetch(url);
          const json = await res.json();

          if(json.error){
            throw new Error(json.error.message || "YouTube API 오류");
          }

          for(const item of (json.items || [])){
            results.push({
              id: item.id,
              videoId: item.id,
              title: item.snippet?.title || "제목 없음",
              channel: item.snippet?.channelTitle || "채널명 없음",
              channelId: item.snippet?.channelId || "",
              views: formatViews(item.statistics?.viewCount || 0),
              commentCount: Number(item.statistics?.commentCount || 0),
              thumb: item.snippet?.thumbnails?.high?.url || item.snippet?.thumbnails?.medium?.url || "",
              avatar: "",
              comments: []
            });
          }
        }

        const channelAvatarById = {};
        const channelIds = [...new Set(results.map(video => video.channelId).filter(Boolean))];

        for(let i = 0; i < channelIds.length; i += chunkSize){
          const chunk = channelIds.slice(i, i + chunkSize);
          const url = `https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${chunk.join(",")}&key=${YT_API_KEY}&maxResults=50`;
          const res = await fetch(url);
          const json = await res.json();

          for(const channel of (json.items || [])){
            channelAvatarById[channel.id] =
              channel.snippet?.thumbnails?.high?.url ||
              channel.snippet?.thumbnails?.medium?.url ||
              channel.snippet?.thumbnails?.default?.url ||
              "";
          }
        }

        results.forEach(video => {
          video.avatar = channelAvatarById[video.channelId] || "";
        });

        state.videos = results;
        renderHome();

        if(state.videos.length > 0){
          openWatch(state.videos[0].id);
        }
      }catch(err){
        console.error(err);
        homeList.innerHTML = `<div class="loading">영상 목록을 불러오지 못했습니다.<br>${escapeHtml(err.message)}</div>`;
      }
    }

    async function loadComments(videoId){
      if(!YT_API_KEY) return [];
      try{
        const url = `https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId=${videoId}&maxResults=20&order=relevance&textFormat=plainText&key=${YT_API_KEY}`;
        const res = await fetch(url);
        const json = await res.json();
        if(json.error) return [];
        return (json.items || []).map(item => {
          const sn = item.snippet?.topLevelComment?.snippet;
          return {
            name: sn?.authorDisplayName || "사용자",
            avatar: sn?.authorProfileImageUrl || "",
            text: sn?.textDisplay || ""
          };
        });
      }catch(e){
        return [];
      }
    }

    function updateRewardUI(){
      const watched = Math.min(state.integratedWatchSeconds, state.rewardGoalSeconds);
      const remain = Math.max(state.rewardGoalSeconds - watched, 0);
      const percent = Math.round((watched / state.rewardGoalSeconds) * 100);

      if(watched >= state.rewardGoalSeconds){
        state.rewardAvailable = true;
        rewardInline.classList.add("reward-ready");
      } else {

        rewardInline.classList.remove("reward-ready");

    }

function updateFixedLayout(){

    const rootRect = document.querySelector(".watch-root").getBoundingClientRect();
    const subRect = document.getElementById("watchSub").getBoundingClientRect();

      : (topFixedRect.bottom - rootRect.top);

    document.documentElement.style.setProperty("--scroll-top", `${fullTop}px`);
    document.documentElement.style.setProperty("--sheet-top", `${sheetTop}px`);
  });
}

function clampMiniPosition(){
  if(!watchScreen.classList.contains("mini-mode")) return;
  if(!topFixed.style.left) return;

  const rect = topFixed.getBoundingClientRect();

  let left = parseFloat(topFixed.style.left) || 12;
  let top = parseFloat(topFixed.style.top) || 12;

  const maxLeft = Math.max(12, window.innerWidth - rect.width - 12);
  const maxTop = Math.max(12, window.innerHeight - rect.height - 12);

  left = Math.min(Math.max(12, left), maxLeft);
  top = Math.min(Math.max(12, top), maxTop);

  topFixed.style.left = `${left}px`;
  topFixed.style.top = `${top}px`;
  topFixed.style.right = "auto";
  topFixed.style.bottom = "auto";
}

function startMiniDrag(e){
  if(!watchScreen.classList.contains("mini-mode")) return;
  if(e.button !== undefined && e.button !== 0) return;
  if(e.target.closest('button')) return;

  const rect = topFixed.getBoundingClientRect();

  topFixed.style.left = `${rect.left}px`;
  topFixed.style.top = `${rect.top}px`;
  topFixed.style.right = "auto";
  topFixed.style.bottom = "auto";

  miniDragActive = true;
  miniDragOffsetX = e.clientX - rect.left;
  miniDragOffsetY = e.clientY - rect.top;

  topFixed.classList.add("dragging");

  document.addEventListener("pointermove", moveMiniDrag);
  document.addEventListener("pointerup", endMiniDrag);

  e.preventDefault();
}

function moveMiniDrag(e){
  if(!miniDragActive) return;

  const rect = topFixed.getBoundingClientRect();
  const maxLeft = Math.max(12, window.innerWidth - rect.width - 12);
  const maxTop = Math.max(12, window.innerHeight - rect.height - 12);

  const nextLeft = Math.min(Math.max(12, e.clientX - miniDragOffsetX), maxLeft);
  const nextTop = Math.min(Math.max(12, e.clientY - miniDragOffsetY), maxTop);

  topFixed.style.left = `${nextLeft}px`;
  topFixed.style.top = `${nextTop}px`;
  topFixed.style.right = "auto";
  topFixed.style.bottom = "auto";
}

function endMiniDrag(){
  if(!miniDragActive) return;

  miniDragActive = false;
  topFixed.classList.remove("dragging");

  document.removeEventListener("pointermove", moveMiniDrag);
  document.removeEventListener("pointerup", endMiniDrag);
}

    function startOpenFlow(type){

      if(state.openType === "random" && state.randomBoxCount <= 0){
        showToast("보유한 랜덤박스가 없습니다.");

      if(state.openType === "gold" && state.goldBoxCount <= 0){

      openSheet("openSheet");

    function runBoxAnimation(){
      openSheetTitle.textContent = state.openType === "gold" ? "황금박스 오픈 중" : "랜덤박스 오픈 중";
      openSheetDesc.textContent = "당첨 결과를 확인하고 있습니다.";

      let phase = 0;
      const texts = [
        "✨ 박스를 열고 있습니다...",
        "⚡ 리워드를 계산 중입니다...",
        "🎉 결과를 불러오는 중..."
      ];

      boxIconStage.classList.remove("box-pop");
      void boxIconStage.offsetWidth;
      boxIconStage.classList.add("box-pop");

      state.openTimer = setInterval(() => {
        openStageText.innerHTML = `
          <div class="glow-burst"></div>
          <div class="box-open-text box-pop">${texts[phase % texts.length]}</div>
        `;
        phase += 1;

        if(phase >= 6){
          clearInterval(state.openTimer);

          let value;
          if(state.openType === "gold"){
            value = weightedRandom(goldBoxTable);
            state.goldBoxCount -= 1;
          } else {
            value = weightedRandom(boxTable);
            state.randomBoxCount -= 1;
          }

          state.totalRewardPoint += value;
          updateWallet();

          openSheetTitle.textContent = "당첨 완료";
          openSheetDesc.textContent = state.openType === "gold" ? "황금박스 오픈 결과입니다." : "랜덤박스 오픈 결과입니다.";
          openStageText.innerHTML = `
            <div class="glow-burst"></div>
            <div class="result-amount box-pop">${value.toLocaleString()} P</div>
            <div class="result-sub">축하합니다! 리워드가 즉시 지급되었습니다.</div>
          `;

          openBoxBtn.disabled = false;
          openBoxBtn.classList.add("ready");
          openBoxBtn.textContent = "닫기";
          openBoxBtn.onclick = closeAllSheets;
        }
      }, 700);
    }

    document.getElementById("openCommentBtn").addEventListener("click", () => openSheet("commentSheet"));
    document.getElementById("openBoxQuick").addEventListener("click", () => startOpenFlow("random"));
    document.getElementById("walletOpenRandom").addEventListener("click", () => startOpenFlow("random"));
    document.getElementById("walletOpenGold").addEventListener("click", () => startOpenFlow("gold"));
    inlineGetBtnWide.addEventListener("click", startRewardAdFlow);

    rewardAdBtn.addEventListener("click", () => {
      if(rewardAdBtn.disabled) return;
      finishRewardGrant("manual");
    });

    openBoxBtn.addEventListener("click", () => startOpenFlow("random"));
    overlay.addEventListener("click", closeAllSheets);

    document.querySelectorAll(".tool-btn[data-add]").forEach(btn => {
      btn.addEventListener("click", () => {
        state.integratedWatchSeconds += Number(btn.dataset.add);
        updateRewardUI();
      });
    });

    watchTitle.addEventListener("click", () => {
      watchTitle.classList.toggle("expanded");
      setTimeout(updateFixedLayout, 20);
    });

    document.querySelectorAll(".sheet-close").forEach(btn => {
      btn.addEventListener("click", closeAllSheets);
    });

    window.addEventListener("resize", updateFixedLayout);

    setupWatchScrollBehavior();
    updateWallet();
    updateRewardUI();
    loadVideosFromYouTube();
