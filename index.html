<!DOCTYPE html>
<!-- Version: v0.1.70 -->
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>VIEWSTER Mobile Demo v5.7</title>
  <style>
    :root{
      --bg:#f4f5f7;
      --card:#ffffff;
      --text:#111827;
      --sub:#6b7280;
      --line:#e5e7eb;
      --primary:#2563eb;
      --accent:#ff575d;
      --green:#16a34a;
      --pill:#eff2f6;
      --shadow:0 8px 24px rgba(15,23,42,.06);
      --header-h:56px;
      --safe-top: env(safe-area-inset-top, 0px);
      --sheet-top:0px;
      --scroll-top:0px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{margin:0;padding:0;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;color:var(--text);}
    body{min-height:100vh;overflow-x:hidden;overflow-y:auto;}
    button,input{font:inherit;}
    img{display:block;max-width:100%;}
    .hidden{display:none !important;}

    .app{
      width:100%;
      max-width:430px;
      min-height:100vh;
      height:auto;
      margin:0 auto;
      background:var(--bg);
      position:relative;
      overflow-x:hidden;
      overflow-y:visible;
      box-shadow:none;
    }

    .screen{
      position:absolute; inset:0;
      display:none;
      background:var(--bg);
    }
    .screen.active{display:flex; flex-direction:column;}

    .header{
      height:calc(var(--header-h) + var(--safe-top));
      background:#fff;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:var(--safe-top) 12px 0;
      flex-shrink:0;
      z-index:30;
      gap:8px;
    }
    .header-left,.header-right{display:flex;align-items:center;gap:10px;min-width:0;}
    .icon-btn{
      width:32px;height:32px;border:none;background:#fff;border-radius:10px;
      display:grid;place-items:center;cursor:pointer;flex-shrink:0;
    }
    .icon-btn svg{width:20px;height:20px;stroke:#111;}
    .brand{
      display:flex;align-items:center;gap:7px;font-weight:900;font-size:14px;
      min-width:0;white-space:nowrap;
    }
    .brand img{width:24px;height:24px;object-fit:contain;flex-shrink:0;}

    .header-test-tools{
      display:flex;
      align-items:center;
      gap:4px;
      margin-left:auto;
      min-width:0;
      overflow-x:auto;
      -ms-overflow-style:none;
      scrollbar-width:none;
    }
    .header-test-tools::-webkit-scrollbar{display:none;}
    .dev-version-label{
      margin-left:auto;
      font-size:11px;
      font-weight:700;
      color:#9ca3af;
      white-space:nowrap;
      flex-shrink:0;
      align-self:center;
    }

    .tool-btn{
      border:none;
      background:#eef3ff;
      color:#2457d6;
      border-radius:10px;
      padding:5px 7px;
      font-size:11px;
      font-weight:900;
      white-space:nowrap;
      cursor:pointer;
      flex-shrink:0;
      height:28px;
      line-height:1;
    }

    .main-scroll{
      flex:1;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      padding-bottom:18px;
    }

    /* HOME */
    .tabs-wrap{
      background:#fff;
      border-bottom:1px solid var(--line);
      padding:10px 12px 12px;
    }
    .tabs{
      display:flex;
      gap:8px;
      overflow:auto;
    }
    .tabs::-webkit-scrollbar{display:none;}
    .tab{
      border:none;
      background:#f0f2f5;
      color:#111;
      padding:9px 13px;
      border-radius:11px;
      white-space:nowrap;
      font-weight:800;
      cursor:pointer;
      font-size:13px;
    }
    .tab.active{background:#111827;color:#fff;}

    .promo-banner{
      margin:10px 12px 8px;
      background:#ffd6e8;
      border-radius:14px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }
    .promo-banner img{width:100%;height:76px;object-fit:cover;}

    .list{padding:0 12px 10px;}
    .video-card{
      background:#fff;
      border-radius:16px;
      overflow:hidden;
      box-shadow:var(--shadow);
      margin-bottom:14px;
      cursor:pointer;
    }
    .thumb-wrap{
      position:relative;
      aspect-ratio:16/9;
      background:#dcdfe5;
    }
    .thumb-wrap img{width:100%;height:100%;object-fit:cover;}
    .info-dot{
      position:absolute;right:10px;top:10px;width:26px;height:26px;border-radius:50%;
      background:rgba(255,255,255,.93);display:grid;place-items:center;font-weight:900;color:#111;font-size:13px;
    }
    .reward-done{
      position:absolute;right:10px;bottom:10px;background:#1fbf5b;color:#fff;
      border-radius:10px;padding:4px 8px;font-size:11px;font-weight:900;
    }
    .card-body{padding:10px 12px 13px;}
    .title{
      font-size:15px;font-weight:900;line-height:1.34;margin:0 0 7px;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .meta-row{display:flex;align-items:center;gap:7px;color:var(--sub);font-size:12px;}
    .avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#ddd;}

    /* WATCH */
    .watch-root{
      flex:1;
      height:100%;
      overflow:hidden;
      position:relative;
      background:var(--bg);
    }

    .top-fixed{
      position:absolute;
      top:var(--safe-top); left:0; right:0;
      z-index:20;
      background:transparent;
    }

    .player-wrap{background:#000;}
    .player{
      width:100%;
      aspect-ratio:16/9;
      background:#000;
      position:relative;
    }
    .player iframe{
      width:100%;
      height:100%;
      border:none;
      display:block;
      position:relative;
      z-index:2;
    }

    .paid-badge{
      position:absolute;
      left:10px;
      top:10px;
      background:rgba(0,0,0,.75);
      color:#fff;
      border-radius:10px;
      padding:7px 10px;
      font-size:12px;
      font-weight:800;
      display:flex;
      align-items:center;
      gap:6px;
      z-index:2;
      transition:opacity .25s ease, transform .25s ease;
    }
    .paid-badge.hide-after{
      opacity:0;
      transform:translateY(-6px);
      pointer-events:none;
    }

    #watchScreen > .header{
      display:none;
    }

    #watchScreen.active{
      position:fixed;
      inset:0;
      height:100dvh;
      background:var(--bg);
      overflow:hidden;
    }

    #watchScreen.active::after{
      display:none;
    }

    .player-float-controls{
      position:absolute;
      top:10px;
      left:10px;
      right:10px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:8px;
      z-index:50;
      pointer-events:none;

    }
/* 기본은 흐리게 */
#watchScreen:not(.mini-mode) .player-float-controls{
  opacity:.32;
  transition:opacity .2s ease;
  top:10px;
  left:12px;
  right:12px;
  z-index:50;
}

/* 활성화되면 선명하게 */
#watchScreen:not(.mini-mode) .player-float-controls.controls-awake{
  opacity:1;
}
    .player-left-controls,
    .player-right-controls{
      display:flex;
      align-items:center;
      gap:6px;
      pointer-events:auto;
      position:relative;
      z-index:51;
    }

    .player-right-controls{
      margin-left:auto;
      max-width:72%;
      overflow:hidden;
    }

    #enterMiniBtn,
    #toggleMiniSizeBtn,
    .player-test-tools,
    .player-test-tools .tool-btn{
      position:relative;
      z-index:51;
      pointer-events:auto;
    }

    .player-fab{
      height:34px;
      min-width:34px;
      padding:0 11px;
      border:none;
      border-radius:999px;
      background:rgba(17,24,39,.78);
      color:#fff;
      font-size:12px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:5px;
      cursor:pointer;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      box-shadow:0 6px 18px rgba(0,0,0,.22);
    }
    .player-fab.icon-only{
      width:34px;
      padding:0;
    }
#enterMiniBtn{
  font-size:22px;
  font-weight:900;
  line-height:1;
  padding-top:1px;
}

    .player-test-tools{
      display:flex;
      gap:6px;
      overflow-x:auto;
      -ms-overflow-style:none;
      scrollbar-width:none;
    }
    .player-test-tools::-webkit-scrollbar{display:none;}
    .player-test-tools .tool-btn{
      height:34px;
      padding:0 10px;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      color:#2457d6;
      font-size:12px;
    }

    .mini-close-btn,
    .mini-restore-hit{
      display:none;
    }

    .mini-ad-wrap{
      display:none;
    }
    .mini-ad-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    #watchScreen.mini-mode{
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      background:transparent;
      pointer-events:none;
      z-index:35;
    }

    #watchScreen.mini-mode .watch-root{
      flex:1;
      min-height:100%;
      background:transparent;
      overflow:visible;
      pointer-events:none;
    }

    #watchScreen.mini-mode .watch-scroll{
      display:none;
    }

    #watchScreen.mini-mode .watch-info-fixed{
      display:none;
    }

    /* PIP 카드: 하나의 묶음처럼 보이게 */
    #watchScreen.mini-mode .top-fixed{
      position:absolute;
      right:12px;
      bottom:74px;
      left:auto;
      top:auto;
      width:170px;
      z-index:60;
      pointer-events:auto;

      display:flex;
      flex-direction:column;
      gap:0;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 16px 40px rgba(2,6,23,.34);
      background:#111827;
    }

    #watchScreen.mini-mode .player-wrap{
      border-radius:0;
      overflow:hidden;
      box-shadow:none;
      background:#000;
    }

    #watchScreen.mini-mode .player{
      aspect-ratio:16/9;
    }

    /* 하단 띠배너 */
    #watchScreen.mini-mode .mini-ad-wrap{
      display:block;
      width:100%;
      height:36px;
      background:#fff;
      overflow:hidden;
      border-top:1px solid rgba(0,0,0,.05);
      pointer-events:auto;
    }

    /* 3단계 크기 */
    #watchScreen.mini-mode.mini-size-1 .top-fixed{
      width:170px;
    }
    #watchScreen.mini-mode.mini-size-1 .mini-ad-wrap{
      height:36px;
    }

    #watchScreen.mini-mode.mini-size-2 .top-fixed{
      width:230px;
    }
    #watchScreen.mini-mode.mini-size-2 .mini-ad-wrap{
      height:40px;
    }

    #watchScreen.mini-mode.mini-size-3 .top-fixed{
      width:calc(100% - 24px);
    }
    #watchScreen.mini-mode.mini-size-3 .mini-ad-wrap{
      height:44px;
    }

    #watchScreen.mini-mode #toggleMiniSizeBtn{
      display:inline-flex !important;
    }

    #watchScreen.mini-mode #enterMiniBtn{
      display:none;
    }

    #watchScreen.mini-mode .paid-badge{
      display:none;
    }

    #watchScreen.mini-mode .player-float-controls{
      top:8px;
      left:8px;
      right:8px;
      z-index:80;
    }

    #watchScreen.mini-mode .player-test-tools{
      display:none;
    }

    #watchScreen.mini-mode .mini-close-btn,
    #watchScreen.mini-mode .mini-restore-hit{
      display:block;
    }

    .mini-close-btn{
      position:absolute;
      top:8px;
      right:8px;
      width:28px;
      height:28px;
      border:none;
      border-radius:999px;
      background:rgba(17,24,39,.82);
      color:#fff;
      font-size:18px;
      line-height:1;
      cursor:pointer;
      z-index:90;
      pointer-events:auto;
      box-shadow:0 6px 18px rgba(0,0,0,.25);
    }

    .mini-restore-hit{
      position:absolute;
      inset:0;
      border:none;
      background:transparent;
      cursor:pointer;
      z-index:70;
    }

    .watch-info-fixed{
      background:#fff;
      border-bottom:1px solid #edf0f4;
      box-shadow:0 4px 18px rgba(15,23,42,.04);
      overflow:hidden;
    }

    .watch-card{
      background:#fff;
      padding:7px 12px 2px;
    }

    .watch-title{
      margin:0 0 3px;
      font-size:15px;
      font-weight:900;
      line-height:1.35;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      cursor:pointer;
    }
    .watch-title.expanded{
      white-space:normal;
      overflow:visible;
      text-overflow:unset;
      display:block;
    }

    .watch-sub{
      font-size:12px;
      color:var(--sub);
      margin-bottom:4px;
    }

    /* 제목/채널 아래만 접히는 영역 */
    .watch-collapse-area{
      overflow:hidden;
      max-height:180px;
      opacity:1;
      transition:max-height .28s ease, opacity .22s ease;
    }
    .watch-collapse-area.collapsed{
      max-height:0;
      opacity:0;
      pointer-events:none;
    }

    .small-actions{
      display:flex;
      gap:6px;
      margin-bottom:4px;
      justify-content:flex-end;
    }
    .small-pill{
      flex:0 0 auto;
      padding:0 12px;
    }

    .small-pill{
      flex:1;
      height:28px;
      border:none;
      border-radius:999px;
      background:var(--pill);
      color:#222;
      font-size:12px;
      font-weight:800;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:4px;
      cursor:pointer;
      padding:0 10px;
    }

    .reward-inline{
      position:relative;
      min-height:32px;
      margin-bottom:0;
      border-radius:999px;
    }
    .reward-line-inner{
      display:flex;
      align-items:center;
      gap:8px;
      width:100%;
      min-height:32px;
    }
    .reward-inline .label{
      font-size:13px;
      font-weight:900;
      white-space:nowrap;
      flex-shrink:0;
    }
    .reward-inline .track{
      flex:1;
      height:7px;
      background:#e7eaf0;
      border-radius:999px;
      overflow:hidden;
      min-width:0;
    }
    .reward-inline .fill{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,#3b82f6,#22c55e);
      border-radius:999px;
      transition:width .35s ease;
    }
    .reward-inline .right{
      min-width:52px;
      text-align:right;
      font-size:13px;
      font-weight:800;
      color:#4b5563;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:flex-end;
    }

    .reward-get-wrap{
      display:none;
      width:100%;
    }
    .reward-inline.reward-ready .reward-line-inner{
      display:none;
    }
    .reward-inline.reward-ready .reward-get-wrap{
      display:block;
    }

    .reward-wide-btn{
      width:100%;
      height:38px;
      border:none;
      border-radius:999px;
      background:#2563eb;
      color:#fff;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(37,99,235,.22);
    }
    .reward-wide-btn:hover{background:#1d4ed8;}
    .reward-wide-btn:active{background:#1e40af;}

    .big-banner{
      margin:6px 12px 8px;
      border-radius:14px;
      overflow:hidden;
      background:#111;
      height:62px;
      box-shadow:var(--shadow);
    }
    .big-banner img{width:100%;height:100%;object-fit:cover;}

    .watch-scroll{
      position:relative;
      height:100%;
      margin-top:var(--scroll-top);
      background:var(--bg);
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
      padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 40px);
    }
    .watch-scroll::after{
      display:none;
    }

    .section-title{
      padding:0 12px 8px;
      font-size:15px;
      font-weight:900;
      color:#111;
      background:#fff;
    }

    .recommend-list{
      padding:0 12px;
      background:#fff;
    }
    .recommend-item{
      display:flex;
      gap:10px;
      padding:12px 0;
      border-bottom:1px solid var(--line);
      cursor:pointer;
    }
    .recommend-item + .recommend-item{margin-top:6px;}
    .recommend-item:last-child{border-bottom:none;margin-bottom:8px;}
    .recommend-thumb{
      width:178px;
      aspect-ratio:16/9;
      border-radius:12px;
      overflow:hidden;
      background:#ddd;
      flex-shrink:0;
      position:relative;
      transition:transform .14s ease, filter .14s ease, box-shadow .14s ease;
    }
    .recommend-item:active .recommend-thumb{
      transform:scale(.985);
      filter:brightness(.94);
      box-shadow:0 4px 10px rgba(15,23,42,.12);
    }
    .recommend-thumb img{width:100%;height:100%;object-fit:cover;}
    .recommend-info{min-width:0;flex:1;}
    .recommend-title{
      font-size:14px;
      font-weight:500;
      line-height:1.35;
      margin:0 0 5px;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
      text-overflow:ellipsis;
      word-break:break-word;
    }
    .recommend-sub{
      font-size:12px;
      color:var(--sub);
      line-height:1.35;
      white-space:normal;
      word-break:break-word;
    }

    /* Overlay / sheets */
    .overlay{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      top:var(--sheet-top);
      width:100%;
      max-width:430px;
      margin:0 auto;
      background:rgba(0,0,0,.48);
      z-index:40;
      display:none;
      overflow:hidden;
    }
    .overlay.show{display:block;}

    .sheet{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      top:var(--sheet-top);
      width:100%;
      max-width:430px;
      margin:0 auto;
      z-index:50;
      background:#fff;
      border-radius:24px 24px 0 0;
      transform:translateY(100%);
      transition:transform .28s ease;
      display:flex;
      flex-direction:column;
      min-height:0;
      height:calc(100dvh - var(--sheet-top));
      max-height:calc(100dvh - var(--sheet-top));
      box-shadow:none;
      overflow:hidden;
      overscroll-behavior-y:none;
      isolation:isolate;
      contain:layout paint;
    }
    .sheet.show{
      transform:translateY(0);
      box-shadow:0 -12px 40px rgba(2,6,23,.18);
    }

    .sheet-head{
      height:48px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      flex-shrink:0;
      background:#fff;
      border-bottom:1px solid rgba(0,0,0,.04);
    }
    .sheet-head::before{
      content:"";
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      width:44px;height:5px;border-radius:999px;background:#d9dee7;
    }
    .sheet-close{
      position:absolute;
      right:10px;
      top:8px;
      width:32px;height:32px;
      border:none;
      border-radius:10px;
      background:#f3f4f6;
      color:#111;
      font-size:18px;
      cursor:pointer;
      display:grid;
      place-items:center;
    }
    .sheet-body{
      flex:1 1 auto;
      min-height:0;
      overflow-x:hidden;
      overflow-y:hidden;
      padding:0 16px 20px;
      overscroll-behavior:contain;
      -webkit-overflow-scrolling:touch;
    }
    .sheet--scroll .sheet-body{
      overflow-y:auto;
    }
    .sheet--action{
      touch-action:manipulation;
    }
    .sheet--action .sheet-body{
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      gap:10px;
      padding-bottom:calc(16px + env(safe-area-inset-bottom, 0px));
    }
    .sheet-body--plain{
      padding:0 0 20px;
    }
    .sheet--action .sheet-body.sheet-body--plain{
      padding:0 0 calc(16px + env(safe-area-inset-bottom, 0px));
    }

    .sheet-title{
      font-size:18px;
      font-weight:900;
      margin:8px 0 14px;
    }

    #commentSheet .sheet-body{
      overflow-y:auto;
    }

    #commentSheet{z-index:50;}
    #walletSheet{z-index:51;}
    #adSheet{z-index:52;}
    #openSheet{z-index:53;}

    #walletSheet,
    #adSheet,
    #openSheet{
      overflow:hidden;
    }
    #walletSheet .sheet-body,
    #adSheet .sheet-body,
    #openSheet .sheet-body{
      overflow:hidden;
    }

    .wallet-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:10px;
    }
    .wallet-card{
      background:#f5f7fb;
      border-radius:16px;
      padding:14px;
      text-align:center;
    }
    .wallet-card.full{grid-column:1 / -1;}
    .wallet-label{font-size:13px;color:#6b7280;font-weight:700;}
    .wallet-value{font-size:20px;font-weight:900;color:var(--primary);margin-top:6px;}

      background:#374151;

    .ad-btn.ready{
      background:linear-gradient(180deg,#3b82f6,#2563eb);
      color:#fff;

    }

    .box-hero{display:none;}
    .box-icon{
      width:186px;
      height:186px;
      display:grid;
      place-items:center;
      position:relative;
      transform-origin:center;
      isolation:isolate;
      --box-glow-color:rgba(96,165,250,.24);
      --box-glow-soft:rgba(191,219,254,.22);
      --box-shadow-color:rgba(8,15,30,.44);
      --box-ribbon-color:rgba(255,255,255,.9);
      --gift-body-top:#60a5fa;
      --gift-body-bottom:#2563eb;
      --gift-lid-top:#93c5fd;
      --gift-lid-bottom:#3b82f6;
      --gift-ribbon:#eff6ff;
    }
    .box-icon::before{
      content:"";
      position:absolute;
      left:50%;
      bottom:8px;
      width:134px;
      height:30px;
      transform:translateX(-50%);
      border-radius:50%;
      background:radial-gradient(circle, rgba(6,10,18,.72) 0%, rgba(6,10,18,0) 72%);
      filter:blur(9px);
      opacity:.8;
      z-index:0;
    }
    .box-icon::after{
      content:"";
      position:absolute;
      inset:28px;
      border-radius:50%;
      background:radial-gradient(circle, var(--box-glow-soft) 0%, var(--box-glow-color) 38%, rgba(37,99,235,0) 76%);
      opacity:.8;
      transform:scale(.9);
      z-index:1;
    }
    .gift-box{
      width:132px;
      height:132px;
      position:relative;
      z-index:4;
      filter:drop-shadow(0 20px 30px var(--box-shadow-color));
      transition:filter .3s ease, transform .3s ease, opacity .24s ease;
    }
    .gift-box::before,
    .gift-box::after{
      content:"";
      position:absolute;
      inset:8px;
      border-radius:20px;
      opacity:0;
      pointer-events:none;
      transition:opacity .22s ease;
    }
    .gift-box::before{
      inset:18px 10px 20px;
      background:
        linear-gradient(112deg, rgba(255,255,255,0) 18%, rgba(255,255,255,.18) 38%, rgba(255,255,255,.46) 50%, rgba(255,255,255,.14) 62%, rgba(255,255,255,0) 82%);
      filter:blur(.4px);
      mix-blend-mode:screen;
      transform:translateX(-26px) rotate(-8deg);
    }
    .gift-box::after{
      inset:16px 12px 14px;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:inset 0 0 20px rgba(255,255,255,.06), 0 0 22px rgba(191,219,254,.06);
    }
    .gift-box-part{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      border-radius:18px;
    }
    .gift-box-glow{
      position:absolute;
      left:50%;
      top:24px;
      width:84px;
      height:84px;
      transform:translateX(-50%) scale(.72);
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,.72) 0%, rgba(191,219,254,.3) 34%, rgba(191,219,254,0) 76%);
      opacity:0;
      filter:blur(3px);
      z-index:1;
    }
    .gift-lid{
      top:18px;
      width:120px;
      height:34px;
      background:linear-gradient(180deg, var(--gift-lid-top) 0%, var(--gift-lid-bottom) 100%);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.28), 0 8px 16px rgba(30,64,175,.18);
      transform-origin:22px 26px;
      z-index:5;
    }
    .gift-lid::before,
    .gift-lid::after,
    .gift-body::before,
    .gift-body::after{
      content:"";
      position:absolute;
      background:linear-gradient(180deg, rgba(255,255,255,.98), var(--gift-ribbon));
      box-shadow:0 0 0 1px rgba(191,219,254,.16);
    }
    .gift-lid::before,
    .gift-body::before{
      left:50%;
      top:0;
      bottom:0;
      width:16px;
      transform:translateX(-50%);
      border-radius:999px;
    }
    .gift-lid::after,
    .gift-body::after{
      left:0;
      right:0;
      top:50%;
      height:12px;
      transform:translateY(-50%);
      border-radius:999px;
    }
    .gift-body{
      top:48px;
      width:112px;
      height:76px;
      background:linear-gradient(180deg, var(--gift-body-top) 0%, var(--gift-body-bottom) 100%);
      border-radius:16px 16px 20px 20px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.24), 0 16px 26px rgba(30,64,175,.22);
      overflow:hidden;
      z-index:3;
    }
    .gift-body::after{
      top:26px;
      transform:none;
    }
    .gift-ribbon-knot{
      position:absolute;
      left:50%;
      top:8px;
      width:30px;
      height:16px;
      transform:translateX(-50%);
      z-index:6;
    }
    .gift-ribbon-knot::before,
    .gift-ribbon-knot::after{
      content:"";
      position:absolute;
      top:0;
      width:16px;
      height:14px;
      border:3px solid rgba(255,255,255,.96);
      border-radius:16px 16px 4px 16px;
      background:rgba(255,255,255,.16);
    }
    .gift-ribbon-knot::before{
      left:0;
      transform:rotate(-26deg);
    }
    .gift-ribbon-knot::after{
      right:0;
      transform:scaleX(-1) rotate(-26deg);
    }
    .box-core-glow,
    .box-lid-light,
    .box-open-flash,
    .box-spark,
    .box-celebration-ring,
    .box-celebration-confetti,
    .result-sparkles{
      position:absolute;
      pointer-events:none;
    }
    .box-core-glow{
      inset:30px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,.22) 0%, var(--box-glow-color) 22%, rgba(96,165,250,0) 68%);
      opacity:.74;
      z-index:2;
      filter:blur(8px);
    }
    .box-lid-light{
      left:50%;
      top:44px;
      width:92px;
      height:22px;
      transform:translateX(-50%);
      border-radius:999px;
      background:linear-gradient(90deg, rgba(255,255,255,0) 0%, var(--box-ribbon-color) 48%, rgba(255,255,255,0) 100%);
      opacity:.18;
      z-index:5;
      filter:blur(2px);
    }
    .box-open-flash{
      left:50%;
      top:28px;
      width:108px;
      height:118px;
      transform:translateX(-50%) scale(.46);
      border-radius:50% 50% 46% 46%;
      background:radial-gradient(circle at 50% 72%, rgba(255,255,255,.98) 0%, rgba(255,255,255,.68) 18%, rgba(191,219,254,.36) 36%, rgba(96,165,250,0) 76%);
      opacity:0;
      z-index:5;
      filter:blur(2px);
    }
    .box-spark{
      width:14px;
      height:14px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(255,255,255,.98) 0%, var(--box-glow-soft) 44%, rgba(191,219,254,0) 74%);
      opacity:0;
      z-index:5;
      box-shadow:0 0 16px var(--box-glow-soft);
    }
    .box-spark-a{left:28px;top:42px;}
    .box-spark-b{right:30px;top:34px;}
    .box-spark-c{left:34px;bottom:42px;}
    .box-spark-d{right:28px;bottom:46px;}
    .box-celebration-ring{
      width:184px;
      height:184px;
      border-radius:50%;
      border:1px solid rgba(253,224,71,.36);
      opacity:0;
      z-index:1;
    }
    .box-celebration-confetti{
      inset:0;
      opacity:0;
      z-index:6;
    }
    .box-celebration-confetti span{
      position:absolute;
      width:10px;
      height:16px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(253,224,71,.98), rgba(245,158,11,.54));
      box-shadow:0 0 14px rgba(253,224,71,.24);
    }
    .box-celebration-confetti span:nth-child(1){left:26px;top:38px;transform:rotate(-18deg);}
    .box-celebration-confetti span:nth-child(2){right:26px;top:48px;transform:rotate(18deg);}
    .box-celebration-confetti span:nth-child(3){left:42px;bottom:40px;transform:rotate(28deg);}
    .box-celebration-confetti span:nth-child(4){right:38px;bottom:34px;transform:rotate(-28deg);}
    .box-icon.is-gold-box{
      --box-glow-color:rgba(250,204,21,.28);
      --box-glow-soft:rgba(253,224,71,.28);
      --box-shadow-color:rgba(120,53,15,.36);
      --box-ribbon-color:rgba(255,249,219,.96);
      --gift-body-top:#fcd34d;
      --gift-body-bottom:#f59e0b;
      --gift-lid-top:#fde68a;
      --gift-lid-bottom:#fbbf24;
      --gift-ribbon:#fff7d6;
    }
    .box-icon.is-random-box{
      --box-glow-color:rgba(168,85,247,.34);
      --box-glow-soft:rgba(236,72,153,.3);
      --box-shadow-color:rgba(49,46,129,.52);
      --box-ribbon-color:rgba(255,255,255,.96);
      --gift-ribbon:transparent;
    }
    .box-icon.is-random-box .gift-box{
      transform:translateY(4px);
      filter:drop-shadow(0 24px 34px rgba(49,46,129,.48));
    }
    .box-icon.is-random-box .gift-ribbon-knot{
      opacity:0;
    }
    .box-icon.is-random-box .gift-lid{
      top:12px;
      width:124px;
      height:40px;
      border-radius:4px 4px 2px 2px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.42), 0 12px 18px rgba(49,46,129,.3);
      transform-origin:20px 30px;
      overflow:visible;
      background:linear-gradient(168deg, rgba(255,255,255,.22), rgba(255,255,255,0) 46%);
    }
    .box-icon.is-random-box .gift-body{
      top:48px;
      width:114px;
      height:80px;
      border-radius:2px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.3), 0 18px 30px rgba(49,46,129,.34);
      background:linear-gradient(172deg, rgba(255,255,255,.14), rgba(255,255,255,0) 44%);
      overflow:visible;
    }
    .box-icon.is-random-box .gift-lid::before,
    .box-icon.is-random-box .gift-body::before{
      inset:0;
      width:auto;
      transform:none;
      border-radius:inherit;
      box-shadow:none;
      background:
        linear-gradient(156deg, rgba(255,255,255,.38) 0%, rgba(255,255,255,0) 42%),
        repeating-linear-gradient(128deg,
          #ff335f 0 10px,
          #ff8a00 10px 20px,
          #ffe600 20px 30px,
          #2de48a 30px 40px,
          #2cb7ff 40px 50px,
          #6b63ff 50px 60px,
          #d54bff 60px 70px);
    }
    .box-icon.is-random-box .gift-lid::after,
    .box-icon.is-random-box .gift-body::after{
      display:none;
    }

    .box-open-stage{
      margin:8px 16px 0;
      min-height:280px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:22px 18px 24px;
      overflow:hidden;
      position:relative;
      border-radius:26px;
      border:none;
      background:
        radial-gradient(circle at 50% 30%, rgba(96,165,250,.14), transparent 24%),
        radial-gradient(circle at 50% 78%, rgba(15,23,42,.34), transparent 34%),
        linear-gradient(180deg, rgba(8,12,24,.94) 0%, rgba(4,8,20,.98) 100%);
      box-shadow:none;
      transition:background .28s ease, box-shadow .28s ease, border-color .28s ease;
      isolation:isolate;
    }
    .open-stage-backdrop{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 32%, rgba(255,255,255,.04), transparent 16%),
        radial-gradient(circle at 50% 82%, rgba(37,99,235,.06), transparent 24%);
      opacity:.8;
      z-index:0;
      pointer-events:none;
    }
    .open-stage-box-wrap{
      position:relative;
      z-index:2;
      display:grid;
      place-items:center;
      width:216px;
      height:216px;
      transition:transform .34s ease, opacity .28s ease, filter .28s ease;
    }
    .open-stage-box-wrap::before{
      content:"";
      position:absolute;
      left:50%;
      bottom:18px;
      width:164px;
      height:46px;
      transform:translateX(-50%);
      border-radius:50%;
      background:radial-gradient(circle, rgba(59,130,246,.22) 0%, rgba(59,130,246,0) 72%);
      opacity:.72;
      filter:blur(10px);
      transition:background .3s ease, opacity .3s ease;
    }
    .open-stage-box-wrap::after{
      content:"";
      position:absolute;
      inset:18px;
      border-radius:50%;
      border:1px solid rgba(191,219,254,.12);
      opacity:0;
      transform:scale(.82);
      transition:border-color .3s ease, opacity .3s ease;
    }
    .box-open-stage.stage-show-result .open-stage-box-wrap{
      opacity:.16;
      transform:translateY(-38px) scale(.78);
      filter:saturate(.82);
    }
    .box-open-stage.stage-animating .open-stage-box-wrap{
      animation:boxStoryEntrance .62s cubic-bezier(.22,1,.36,1) both;
    }
    .box-open-stage.stage-animating #boxIconStage{
      animation:boxStoryStart .82s cubic-bezier(.22,1,.36,1) both;
    }
    .box-open-stage.stage-animating #boxIconStage .gift-box{
      animation:boxStorySettle .44s ease-out .12s both;
    }
    .box-open-stage.stage-animating #boxIconStage .box-lid-light,
    .box-open-stage.stage-animating #boxIconStage .gift-box-glow{
      animation:boxSoftCharge .58s ease-out .32s both;
    }
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-random #boxIconStage{
      animation:boxStoryStart .68s cubic-bezier(.22,1,.36,1) both;
    }
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-random #boxIconStage .gift-box{
      animation:rainbowBoxFloat .92s cubic-bezier(.22,1,.36,1) both;
    }
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-random #boxIconStage .box-lid-light,
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-random #boxIconStage .gift-box-glow{
      animation:boxSoftCharge .42s ease-out .22s both;
    }
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-random #boxIconStage .gift-lid{
      animation:giftBoxLidQuickOpen .42s cubic-bezier(.22,1,.36,1) .54s both;
    }
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-random #boxIconStage .gift-ribbon-knot{
      animation:giftRibbonQuickLift .42s cubic-bezier(.22,1,.36,1) .54s both;
    }
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-random #boxIconStage .box-open-flash{
      animation:boxOpenFlash .32s ease-out .58s both;
    }
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-random #boxIconStage .box-spark-a,
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-random #boxIconStage .box-spark-b,
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-random #boxIconStage .box-spark-c,
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-random #boxIconStage .box-spark-d{
      animation:boxSparkBurst .44s ease-out .62s both;
    }
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-random #boxIconStage .box-spark-b{animation-delay:.68s;}
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-random #boxIconStage .box-spark-c{animation-delay:.74s;}
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-random #boxIconStage .box-spark-d{animation-delay:.8s;}
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-fail #boxIconStage,
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-gold #boxIconStage{
      animation:
        boxStoryStart .86s cubic-bezier(.22,1,.36,1) both,
        boxTensionShake .76s ease-in-out .82s both,
        boxSuspenseDrift var(--mystery-total, 1360ms) ease-in-out 1.44s both;
    }
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-fail #boxIconStage .gift-box,
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-gold #boxIconStage .gift-box{
      animation:boxStorySettle .44s ease-out .12s both;
    }
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-fail #boxIconStage .gift-lid,
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-gold #boxIconStage .gift-lid{
      animation:giftBoxLidTease .92s cubic-bezier(.22,1,.36,1) .82s both;
    }
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-fail #boxIconStage .gift-ribbon-knot,
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-gold #boxIconStage .gift-ribbon-knot{
      animation:giftRibbonTease .92s cubic-bezier(.22,1,.36,1) .82s both;
    }
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-fail #boxIconStage .box-lid-light,
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-fail #boxIconStage .gift-box-glow,
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-gold #boxIconStage .box-lid-light,
    .box-open-stage.stage-animating .open-stage-box-wrap.is-reveal-gold #boxIconStage .gift-box-glow{
      animation:boxSoftCharge .62s ease-out .32s both;
    }
    .box-open-stage.stage-animating .open-stage-box-wrap.is-suspense-phase::before{
      animation:suspenseFloorGlow var(--mystery-cycle, 380ms) ease-in-out 0s var(--mystery-count, 4) both;
    }
    .box-open-stage.stage-animating .open-stage-box-wrap.is-suspense-phase::after{
      animation:suspenseHaloPulse var(--mystery-cycle, 380ms) ease-in-out 0s var(--mystery-count, 4) both;
    }
    .box-open-stage.stage-animating .open-stage-box-wrap.is-suspense-phase #boxIconStage .gift-box::before{
      animation:mysteryShimmerSweep var(--mystery-cycle, 320ms) cubic-bezier(.4,0,.2,1) 0s var(--mystery-count, 4) both;
    }
    .box-open-stage.stage-animating .open-stage-box-wrap.is-suspense-phase #boxIconStage .gift-box::after{
      animation:mysteryEdgeBlink var(--mystery-cycle, 320ms) ease-in-out 0s var(--mystery-count, 4) both;
    }
    .box-open-stage.stage-animating .open-stage-box-wrap.is-suspense-phase #boxIconStage .box-lid-light,
    .box-open-stage.stage-animating .open-stage-box-wrap.is-suspense-phase #boxIconStage .gift-box-glow{
      animation:mysteryGlowBreath var(--mystery-cycle, 320ms) ease-in-out 0s var(--mystery-count, 4) both;
    }

      return `https://www.youtube-nocookie.com/embed/${encodeURIComponent(id)}?${params.toString()}`;
    }

    function formatTime(totalSeconds){
      const m = Math.floor(totalSeconds / 60);
      const s = totalSeconds % 60;
      return `${m}:${String(s).padStart(2,"0")}`;
    }

    function formatViews(num){
      const n = Number(num || 0);
      if(n >= 100000000) return `조회수 ${(n / 100000000).toFixed(1)}억회`;
      if(n >= 10000) return `조회수 ${Math.floor(n / 10000)}만회`;
      return `조회수 ${n.toLocaleString()}회`;
    }

    }

    function weightedRandom(items){
      const total = items.reduce((sum, item) => sum + item.weight, 0);
      let rnd = Math.random() * total;
      for(const item of items){
        rnd -= item.weight;
        if(rnd <= 0) return item.value;
      }
      return items[items.length - 1].value;
    }

    function createBoxResult(items, resultTypes = boxResultTypeTable){
      return {
        reward: weightedRandom(items),
        type: weightedRandom(resultTypes)
      };
    }

    function randomInt(min, max){

    async function loadVideosFromYouTube(){
      const ids = VIDEO_URL_POOL.map(extractVideoId).filter(Boolean);
      if(!YT_API_KEY){
        homeList.innerHTML = '<div class="loading">YT_API_KEY를 넣어주세요.</div>';
        recommendList.innerHTML = '<div class="loading">YT_API_KEY를 넣어주세요.</div>';
        return;
      }

      try{
        const chunkSize = 50;
        const results = [];

        for(let i = 0; i < ids.length; i += chunkSize){
          const chunk = ids.slice(i, i + chunkSize);
          const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=${chunk.join(",")}&key=${YT_API_KEY}&maxResults=50`;
          const res = await fetch(url);
          const json = await res.json();

          if(json.error){
            throw new Error(json.error.message || "YouTube API 오류");
          }

          for(const item of (json.items || [])){
            results.push({
              id: item.id,
              videoId: item.id,
              title: item.snippet?.title || "제목 없음",
              channel: item.snippet?.channelTitle || "채널명 없음",
              channelId: item.snippet?.channelId || "",
              views: formatViews(item.statistics?.viewCount || 0),
              commentCount: Number(item.statistics?.commentCount || 0),
              thumb: item.snippet?.thumbnails?.high?.url || item.snippet?.thumbnails?.medium?.url || "",
              avatar: "",
              comments: []
            });
          }
        }

        const channelAvatarById = {};
        const channelIds = [...new Set(results.map(video => video.channelId).filter(Boolean))];

        for(let i = 0; i < channelIds.length; i += chunkSize){
          const chunk = channelIds.slice(i, i + chunkSize);
          const url = `https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${chunk.join(",")}&key=${YT_API_KEY}&maxResults=50`;
          const res = await fetch(url);
          const json = await res.json();

          for(const channel of (json.items || [])){
            channelAvatarById[channel.id] =
              channel.snippet?.thumbnails?.high?.url ||
              channel.snippet?.thumbnails?.medium?.url ||
              channel.snippet?.thumbnails?.default?.url ||
              "";
          }
        }

        results.forEach(video => {
          video.avatar = channelAvatarById[video.channelId] || "";
        });

        state.videos = results;
        renderHome();

        if(state.videos.length > 0){
          openWatch(state.videos[0].id);
        }
      }catch(err){
        console.error(err);
        homeList.innerHTML = `<div class="loading">영상 목록을 불러오지 못했습니다.<br>${escapeHtml(err.message)}</div>`;
      }
    }

    async function loadComments(videoId){
      if(!YT_API_KEY) return [];
      try{
        const url = `https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId=${videoId}&maxResults=20&order=relevance&textFormat=plainText&key=${YT_API_KEY}`;
        const res = await fetch(url);
        const json = await res.json();
        if(json.error) return [];
        return (json.items || []).map(item => {
          const sn = item.snippet?.topLevelComment?.snippet;
          return {
            name: sn?.authorDisplayName || "사용자",
            avatar: sn?.authorProfileImageUrl || "",
            text: sn?.textDisplay || ""
          };
        });
      }catch(e){
        return [];
      }
    }

function clampMiniPosition(){
  if(!watchScreen.classList.contains("mini-mode")) return;
  if(!topFixed.style.left) return;

  const rect = topFixed.getBoundingClientRect();

  let left = parseFloat(topFixed.style.left) || 12;
  let top = parseFloat(topFixed.style.top) || 12;

  const maxLeft = Math.max(12, window.innerWidth - rect.width - 12);
  const maxTop = Math.max(12, window.innerHeight - rect.height - 12);

  left = Math.min(Math.max(12, left), maxLeft);
  top = Math.min(Math.max(12, top), maxTop);

  topFixed.style.left = `${left}px`;
  topFixed.style.top = `${top}px`;
  topFixed.style.right = "auto";
  topFixed.style.bottom = "auto";
}

function startMiniDrag(e){
  if(!watchScreen.classList.contains("mini-mode")) return;
  if(e.button !== undefined && e.button !== 0) return;
  if(e.target.closest('button')) return;

  const rect = topFixed.getBoundingClientRect();

  topFixed.style.left = `${rect.left}px`;
  topFixed.style.top = `${rect.top}px`;
  topFixed.style.right = "auto";
  topFixed.style.bottom = "auto";

  miniDragActive = true;
  miniDragOffsetX = e.clientX - rect.left;
  miniDragOffsetY = e.clientY - rect.top;

  topFixed.classList.add("dragging");

  document.addEventListener("pointermove", moveMiniDrag);
  document.addEventListener("pointerup", endMiniDrag);

  e.preventDefault();
}

function moveMiniDrag(e){
  if(!miniDragActive) return;

  const rect = topFixed.getBoundingClientRect();
  const maxLeft = Math.max(12, window.innerWidth - rect.width - 12);
  const maxTop = Math.max(12, window.innerHeight - rect.height - 12);

  const nextLeft = Math.min(Math.max(12, e.clientX - miniDragOffsetX), maxLeft);
  const nextTop = Math.min(Math.max(12, e.clientY - miniDragOffsetY), maxTop);

  topFixed.style.left = `${nextLeft}px`;
  topFixed.style.top = `${nextTop}px`;
  topFixed.style.right = "auto";
  topFixed.style.bottom = "auto";
}

function endMiniDrag(){
  if(!miniDragActive) return;

  miniDragActive = false;
  topFixed.classList.remove("dragging");

  document.removeEventListener("pointermove", moveMiniDrag);
  document.removeEventListener("pointerup", endMiniDrag);
}

    function startMysterySuspense(sequence){
      if(!sequence.suspenseCount || !sequence.suspenseInterval) return;

      const suspenseWindow = sequence.suspenseCount * sequence.suspenseInterval;
      const finalOpenAt = Math.max(sequence.revealDelay - sequence.suspenseOpenLead, 0);
      const finalConfirmAt = Math.max(finalOpenAt - sequence.suspenseConfirmLead, 0);
      const suspenseStartAt = Math.max(finalConfirmAt - suspenseWindow, 0);
      const suspenseTotal = Math.max(finalConfirmAt - suspenseStartAt, sequence.suspenseInterval);
      const isGoldResult = sequence.revealVariant === "reveal-gold";

      scheduleOpenStageTimer(() => {
        openStageBoxWrap.style.setProperty("--mystery-count", sequence.suspenseCount);
        openStageBoxWrap.style.setProperty("--mystery-cycle", `${sequence.suspenseInterval}ms`);
        openStageBoxWrap.style.setProperty("--mystery-total", `${suspenseTotal}ms`);
        openStageBoxWrap.classList.add("is-suspense-phase");
        openStageBoxWrap.classList.toggle("is-suspense-gold", isGoldResult);
      }, suspenseStartAt);

      scheduleOpenStageTimer(() => {
        openStageBoxWrap.classList.toggle("is-final-gold", isGoldResult);
        if(isGoldResult){
          syncOpenStageBoxAsset("gold");
        }
      }, finalConfirmAt);

      scheduleOpenStageTimer(() => {
        if(!isGoldResult){
          syncOpenStageBoxAsset("random");
        }
        openStageBoxWrap.classList.remove("is-suspense-phase");
        openStageBoxWrap.classList.add("is-opening-final");
      }, finalOpenAt);
    }

      if(!preserveFlowState){
        state.openForcedResultType = null;
        state.openFromWallet = false;
        state.openType = "random";
      }
      resetOpenStageState();
      setOpenBoxBtnMode("start");
      boxIconStage.classList.remove("box-pop");
      void boxIconStage.offsetWidth;
      boxIconStage.classList.add("box-pop");
      resetSheetScroll("openSheet");
    }

    function closeAllSheets(options = {}){
      const keepWallet = !!options.keepWallet;
      const preserveOpenFlowState = !!options.preserveOpenFlowState;

      managedSheetIds.forEach(id => {
        if(keepWallet && id === "walletSheet") return;
        document.getElementById(id).classList.remove("show");
      });

      resetRewardAdState();
      resetOpenSheetState({ preserveFlowState: preserveOpenFlowState });

      if(!keepWallet){
        resetSheetScroll("walletSheet");
        resetSheetScroll("commentSheet");
      }

      if(document.querySelector(".sheet.show")){
        overlay.classList.add("show");
      } else {
        overlay.classList.remove("show");
      }

      syncSheetScrollLock();
    }

    function openSheet(id, options = {}){
      const keepWallet = !!options.keepWallet;
      const shouldKeepWallet = keepWallet && id === "openSheet" && document.getElementById("walletSheet").classList.contains("show");

      closeAllSheets({ keepWallet: shouldKeepWallet, preserveOpenFlowState: id === "openSheet" });

      overlay.classList.add("show");
      document.getElementById(id).classList.add("show");
      resetSheetScroll(id);
      syncSheetScrollLock();
    }

    function resetOpenSheetFx(){
      openSheetEl.classList.remove(...openSheetFxClasses);
    }

    function applyOpenSheetFx(type){
      resetOpenSheetFx();
      if(type){
        openSheetEl.classList.add(type);
      }
    }

    function resetOpenStageState(){
      setOpenStageVariant(state.openType === "gold" ? "gold" : "random");
      openStage.classList.remove("stage-show-result", "stage-animating", "stage-video-playing");
      openStageBoxWrap.classList.remove("is-opening-final", "is-final-gold");
      openStageResult.classList.remove("show-gold-box", "gold-win");
      openStageText.textContent = "";
      openResultAmount.textContent = "";
      openResultSub.textContent = "";
      stopOpenStageVideo();
    }

    function setOpenStageMessage(message, options = {}){
      openStage.classList.remove("stage-show-result");
      openStage.classList.toggle("stage-animating", !!options.animating);
      openStageResult.classList.remove("show-gold-box", "gold-win");
      if(options.variant){
        setOpenStageVariant(options.variant);
      }
      openStageText.textContent = message || "";
      openResultAmount.textContent = "";
      openResultSub.textContent = "";
    }

    function showOpenStageResult({ amountText, subText = "", showGoldBox = false, showGoldWin = false }){
      openResultAmount.textContent = amountText;
      openResultSub.textContent = subText;
      openStage.classList.remove("stage-animating", "stage-video-playing");
      openStageResult.classList.toggle("show-gold-box", showGoldBox);
      openStageResult.classList.toggle("gold-win", showGoldWin);
      openStage.classList.add("stage-show-result");
    }

    function closeOpenSheetOnly(){
      document.getElementById("openSheet").classList.remove("show");
      resetOpenSheetState();

      if(!document.querySelector(".sheet.show")){
        overlay.classList.remove("show");
      }

      syncSheetScrollLock();
    }

    function startRewardAdFlow(){
      if(!state.rewardAvailable) return;
      openSheet("adSheet");

      state.rewardAdSeconds = 0;
      rewardAdVideo.play().catch(() => {});
      state.rewardAdTimer = setInterval(() => {
        state.rewardAdSeconds += 1;
        const percent = Math.min((state.rewardAdSeconds / 15) * 100, 100);
        rewardAdProgress.style.width = `${percent}%`;

        if(state.rewardAdSeconds < 5){
          rewardAdBtn.textContent = `받기 (${5 - state.rewardAdSeconds}s)`;
          rewardAdGuideLeft.textContent = "광고 재생중...";
        } else {
          rewardAdBtn.disabled = false;
          rewardAdBtn.classList.add("ready");
          rewardAdBtn.textContent = "랜덤박스 받기";
          rewardAdGuideLeft.textContent = "지금 직접 받을 수 있어요";
        }

        rewardAdGuideRight.textContent = `${Math.max(15 - state.rewardAdSeconds, 0)}초 후 자동 지급`;

        if(state.rewardAdSeconds >= 15){
          clearInterval(state.rewardAdTimer);
          finishRewardGrant("auto");
        }
      }, 1000);
    }

    function finishRewardGrant(type){
      clearInterval(state.rewardAdTimer);
      state.randomBoxCount += 1;
      state.integratedWatchSeconds = 0;
      state.rewardAvailable = false;
      updateWallet();
      updateRewardUI();
      closeAllSheets();
      startAutoWatchTimer();

      showToast(
        type === "auto"
          ? "랜덤박스 1개가 자동 지급되었습니다."
          : "랜덤박스 1개를 지급받았습니다."
      );
    }

    function startOpenFlow(type, options = {}){
      state.openType = type || "random";
      state.openForcedResultType = options.forcedResultType || null;
      state.openFromWallet = !!options.fromWallet;
      clearTimeout(state.openAutoCloseTimer);
      clearTimeout(state.openTimer);
      resetOpenSheetFx();

      if(state.openType === "random" && state.randomBoxCount <= 0){
        showToast("보유한 랜덤박스가 없습니다.");
        return;
      }
      if(state.openType === "gold" && state.goldBoxCount <= 0){
        showToast("보유한 황금박스가 없습니다.");
        return;
      }

      openSheet("openSheet", { keepWallet: state.openFromWallet });
      setOpenBoxBtnMode("busy");
      if(state.openType === "gold"){
        applyOpenSheetFx("fx-gold-open");
      }

      setOpenStageMessage("", {
        animating: true,
        variant: state.openType === "gold" ? "gold" : "random"
      });

      const openDelay = (state.openType === "random" && (state.openForcedResultType === "chance_fail" || state.openForcedResultType === "chance_gold")) ? 0 : 180;
      state.openTimer = setTimeout(() => {
        runBoxAnimation();
      }, openDelay);
    }

    function runBoxAnimation(){
      let result;
      let revealDone = false;

      if(state.openType === "gold"){
        result = createBoxResult(goldBoxTable, [{ value: "normal", weight: 1 }]);
      } else {
        result = createBoxResult(
          boxTable,
          state.openForcedResultType
            ? [{ value: state.openForcedResultType, weight: 1 }]
            : boxResultTypeTable
        );
      }

      const sequence = getOpenSequenceConfig({
        openType: state.openType,
        resultType: result.type
      });

      applyOpenSheetFx(sequence.fxClass);
      boxIconStage.classList.remove("box-pop");
      void boxIconStage.offsetWidth;
      boxIconStage.classList.add("box-pop");
      setOpenStageMessage("", {
        animating: true,
        variant: sequence.revealVariant === "gold" ? "gold" : sequence.stageVariant
      });
      setOpenStageVariant(sequence.revealVariant);
      openStageBoxWrap.classList.remove("is-opening-final", "is-final-gold", "is-suspense-phase");
      setOpenBoxBtnMode("busy", sequence.busyLabel);

      if(state.openType === "gold"){
        scheduleOpenStageTimer(() => {
          openStageBoxWrap.classList.add("is-final-gold");
          openStageBoxWrap.classList.add("is-opening-final");
        }, Math.max(sequence.revealDelay - 900, 0));
      }

      const revealResult = () => {
        if(revealDone) return;
        revealDone = true;
        if(state.openType === "gold"){
          state.goldBoxCount -= 1;
        } else {
          state.randomBoxCount -= 1;
        }

        state.totalRewardPoint += result.reward;
        if(state.openType === "random" && result.type === "chance_gold"){
          state.goldBoxCount += 1;
        }
        updateWallet();

        if(state.openType === "random" && result.type === "chance_fail"){
          showOpenStageResult({
            amountText: `${result.reward.toLocaleString()} P`,
            subText: ""
          });
        } else if(state.openType === "random" && result.type === "chance_gold"){
          showOpenStageResult({
            amountText: `${result.reward.toLocaleString()} P`,
            subText: "황금박스 획득",
            showGoldBox: false,
            showGoldWin: true
          });
        } else {
          showOpenStageResult({
            amountText: `${result.reward.toLocaleString()} P`,
            subText: ""
          });
        }

        if(state.openFromWallet){
          setOpenBoxBtnMode("busy", sequence.busyLabel);
          state.openAutoCloseTimer = setTimeout(() => {
            closeOpenSheetOnly();
          }, Math.max(sequence.autoCloseDelay - sequence.revealDelay, 1200));
        } else {
          setOpenBoxBtnMode("close");
        }
      };

      if(sequence.videoSrc){
        playOpenStageVideo(sequence.videoSrc, revealResult);
        return;
      }

      state.openTimer = setTimeout(revealResult, sequence.revealDelay);
    }

    document.getElementById("backToHome").addEventListener("click", backToHome);
    enterMiniBtn.addEventListener("click", enterMiniMode);
    miniCloseBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      backToHome();
    });
    miniRestoreHit.addEventListener("click", exitMiniMode);
    toggleMiniSizeBtn.addEventListener("click", toggleMiniSize);
    playerWrap.addEventListener("click", wakePlayerControls);
playerFloatControls.addEventListener("click", wakePlayerControls);
playerFloatControls.addEventListener("touchstart", wakePlayerControls, { passive: true });


    document.getElementById("openWalletBtn").addEventListener("click", () => openSheet("walletSheet"));
    document.getElementById("openCommentBtn").addEventListener("click", () => openSheet("commentSheet"));
    document.getElementById("walletOpenRandom").addEventListener("click", () => startOpenFlow("random", { fromWallet: true, forcedResultType: "normal" }));
    document.getElementById("walletOpenRandomFail").addEventListener("click", () => startOpenFlow("random", { fromWallet: true, forcedResultType: "chance_fail" }));
    document.getElementById("walletOpenRandomGold").addEventListener("click", () => startOpenFlow("random", { fromWallet: true, forcedResultType: "chance_gold" }));
    document.getElementById("walletOpenGold").addEventListener("click", () => startOpenFlow("gold", { fromWallet: true }));
    inlineGetBtnWide.addEventListener("click", startRewardAdFlow);

    rewardAdBtn.addEventListener("click", () => {
      if(rewardAdBtn.disabled) return;
      finishRewardGrant("manual");
    });

    openBoxBtn.addEventListener("click", () => {
      if(state.openBoxBtnMode === "busy") return;
      if(state.openBoxBtnMode === "close"){
        closeOpenSheetOnly();
        return;
      }
      startOpenFlow(state.openType === "gold" ? "gold" : "random");
    });
    overlay.addEventListener("click", () => {
      if(state.openFromWallet && document.getElementById("openSheet").classList.contains("show")){
        closeOpenSheetOnly();
        return;
      }
      closeAllSheets();
    });

    document.querySelectorAll(".tool-btn[data-add]").forEach(btn => {
      btn.addEventListener("click", () => {
        state.integratedWatchSeconds += Number(btn.dataset.add);
        updateRewardUI();
      });
    });

    document.querySelectorAll(".tool-btn[data-reward-set]").forEach(btn => {
      btn.addEventListener("click", () => {
        state.integratedWatchSeconds = Number(btn.dataset.rewardSet);
        updateRewardUI();
      });
    });

    document.querySelectorAll(".tool-btn[data-box-add]").forEach(btn => {
      btn.addEventListener("click", () => {
        if(btn.dataset.boxAdd === "gold") {
          state.goldBoxCount += 1;
          updateWallet();
          showToast("황금박스 +1");
          return;
        }

        state.randomBoxCount += 1;
        updateWallet();
        showToast("랜덤박스 +1");
      });
    });

    watchTitle.addEventListener("click", () => {
      watchTitle.classList.toggle("expanded");
      setTimeout(updateFixedLayout, 20);
    });

    document.querySelectorAll(".sheet-close").forEach(btn => {
      btn.addEventListener("click", () => {
        if(btn.dataset.close === "openSheet"){
          closeOpenSheetOnly();
          return;
        }
        closeAllSheets();
      });
    });

    window.addEventListener("resize", updateFixedLayout);

    setupWatchScrollBehavior();
    updateWallet();
    updateRewardUI();
    loadVideosFromYouTube();
  </script>
</body>
</html>
